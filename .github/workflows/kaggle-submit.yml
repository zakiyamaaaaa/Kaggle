name: CI and Kaggle Submit

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      exp_id:
        description: "Optional kaggle-push directory name to submit, for example exp-007."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: kaggle-submit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect submission bundle
    runs-on: ubuntu-latest
    outputs:
      should_submit: ${{ steps.detect.outputs.should_submit }}
      submit_dir: ${{ steps.detect.outputs.submit_dir }}
      exp_id: ${{ steps.detect.outputs.exp_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changed Kaggle files
        env:
          WORKFLOW_EXP_ID: ${{ github.event.inputs.exp_id || '' }}
        run: |
          if [ -n "$WORKFLOW_EXP_ID" ]; then
            python ai_agent_security/scripts/detect_submission_changes.py --exp-id "$WORKFLOW_EXP_ID"
          else
            python ai_agent_security/scripts/detect_submission_changes.py
          fi

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile automation scripts
        run: python -m py_compile ai_agent_security/scripts/*.py

      - name: Validate Kaggle bundle
        if: needs.detect.outputs.should_submit == 'true'
        run: python ai_agent_security/scripts/validate_submission_bundle.py "${{ needs.detect.outputs.submit_dir }}"

      - name: Install project dependencies
        if: needs.detect.outputs.should_submit == 'true'
        run: python -m pip install kaggle aicomp-sdk

      - name: Validate matching attack.py
        if: needs.detect.outputs.should_submit == 'true'
        env:
          EXP_ID: ${{ needs.detect.outputs.exp_id }}
        run: |
          python - <<'PY' > /tmp/attack_path
          import os
          from pathlib import Path

          exp_id = os.environ["EXP_ID"]
          runs_dir = Path("ai_agent_security/experiments/runs")
          candidates = sorted(runs_dir.glob(f"{exp_id}*/attack.py"))
          if len(candidates) == 1:
              print(candidates[0])
          elif len(candidates) > 1:
              raise SystemExit(
                  "Multiple matching attack.py files found: "
                  + ", ".join(str(path) for path in candidates)
              )
          PY
          ATTACK_PATH="$(cat /tmp/attack_path)"
          if [ -n "$ATTACK_PATH" ]; then
            cd ai_agent_security
            aicomp validate redteam "../$ATTACK_PATH"
          else
            echo "No matching experiments/runs/${EXP_ID}*/attack.py found; skipping aicomp validation."
          fi

  submit:
    name: Submit to Kaggle
    runs-on: ubuntu-latest
    needs:
      - detect
      - ci
    if: needs.detect.outputs.should_submit == 'true' && needs.ci.result == 'success' && github.ref == 'refs/heads/main'
    timeout-minutes: 390
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      SUBMIT_MESSAGE: ${{ needs.detect.outputs.exp_id }} github:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Kaggle CLI
        run: python -m pip install kaggle

      - name: Push kernel and submit completed version
        run: |
          python ai_agent_security/scripts/submit_kaggle_kernel.py \
            "${{ needs.detect.outputs.submit_dir }}" \
            --message "$SUBMIT_MESSAGE"
