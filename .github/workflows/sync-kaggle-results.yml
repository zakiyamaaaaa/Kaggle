name: Sync Kaggle experiment results

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: Asia/Tokyo
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-kaggle-results
  cancel-in-progress: false

jobs:
  sync:
    name: Sync results.csv from Kaggle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Kaggle CLI
        run: python -m pip install kaggle

      - name: Sync submissions from Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        working-directory: ai_agent_security
        run: python scripts/exp.py sync

      - name: Commit results.csv if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai_agent_security/experiments/results.csv
          if git diff --staged --quiet; then
            echo "No changes to results.csv."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
Sync Kaggle submission results.

Scheduled update from scripts/exp.py sync.
EOF
)"
          git push
