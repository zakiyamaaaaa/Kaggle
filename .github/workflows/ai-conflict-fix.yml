name: AI conflict fixer

on:
  pull_request_target:
    types: [labeled]
    branches: [main]
  schedule:
    - cron: "10 2 * * *"
      timezone: Asia/Tokyo
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional single PR number to repair"
        required: false
        type: string

# The job is restricted to same-repository PRs before any secret is used.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ai-conflict-fix-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: false

jobs:
  fix-conflicts:
    name: Fix merge conflicts with OpenAI
    if: github.event_name != 'pull_request_target' || github.event.label.name == 'ai-conflict-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER_INPUT: ${{ inputs.pr_number || '' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
    steps:
      - name: Checkout trusted resolver code from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: trusted
          fetch-depth: 1

      - name: Install OpenAI SDK
        run: python -m pip install --disable-pip-version-check openai

      - name: Resolve labeled conflicts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "OPENAI_API_KEY is not configured in repository Actions secrets."
            exit 1
          fi

          if [[ -n "$PR_NUMBER_INPUT" ]]; then
            pr_numbers=("$PR_NUMBER_INPUT")
          elif [[ -n "${{ github.event.pull_request.number || '' }}" ]]; then
            pr_numbers=("${{ github.event.pull_request.number }}")
          else
            mapfile -t pr_numbers < <(
              gh pr list --repo "$REPOSITORY" --state open --base main \
                --label ai-conflict-fix --json number --jq '.[].number' --limit 100
            )
          fi

          git -C trusted fetch origin main --depth=1
          failed=0
          for pr_number in "${pr_numbers[@]}"; do
            [[ -z "$pr_number" ]] && continue
            [[ "$pr_number" =~ ^[0-9]+$ ]] || {
              echo "Skipping invalid PR number: ${pr_number}"
              failed=1
              continue
            }
            endpoint="repos/${REPOSITORY}/pulls/${pr_number}"
            pr_json="$(gh api "$endpoint")"
            [[ "$(jq -r '.state' <<< "$pr_json")" == "open" ]] || continue
            [[ "$(jq -r '.base.ref' <<< "$pr_json")" == "main" ]] || continue
            [[ "$(jq -r '.draft // false' <<< "$pr_json")" == "false" ]] || continue
            [[ "$(jq -r '.head.repo.full_name // ""' <<< "$pr_json")" == "$REPOSITORY" ]] || {
              echo "Skipping PR #${pr_number}: fork PRs cannot receive this write-capable fixer."
              continue
            }

            head_ref="$(jq -r '.head.ref' <<< "$pr_json")"
            workdir="work-${pr_number}"
            rm -rf "$workdir"
            git -C trusted fetch origin "refs/pull/${pr_number}/head:refs/remotes/origin/pr-${pr_number}"
            git -C trusted worktree add --detach "$workdir" "refs/remotes/origin/pr-${pr_number}"

            cleanup() {
              git -C trusted worktree remove --force "$workdir" >/dev/null 2>&1 || true
            }

            git -C "$workdir" config user.name "github-actions[bot]"
            git -C "$workdir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            if git -C "$workdir" merge --no-commit --no-ff origin/main; then
              echo "PR #${pr_number} is no longer conflicted."
              cleanup
              continue
            fi

            python trusted/ai_agent_security/scripts/resolve_merge_conflicts_with_openai.py \
              --repo-root "$workdir" \
              --model "$OPENAI_MODEL"

            if git -C "$workdir" diff --name-only --diff-filter=U | grep -q .; then
              echo "PR #${pr_number} still contains unresolved conflicts."
              cleanup
              failed=1
              continue
            fi
            git -C "$workdir" add -A
            git -C "$workdir" diff --cached --check

            if git -C "$workdir" diff --cached --quiet; then
              echo "PR #${pr_number} produced no changes after conflict resolution."
              cleanup
              failed=1
              continue
            fi

            git -C "$workdir" commit -m "Resolve merge conflicts with OpenAI"
            git -C "$workdir" push origin "HEAD:${head_ref}"
            gh pr comment "$pr_number" --repo "$REPOSITORY" --body \
              "OpenAI でコンフリクトを解消し、修正コミットを push しました。Python CI の成功後に自動マージを再判定します。"
            cleanup
          done
          exit "$failed"
